<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - BloodBond</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="assets/logo.png" alt="BloodBond Logo" class="logo">
      <h1>BloodBond</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="#">Request</a>
      <a href="#">Donate</a>
      <a href="#">Find Donors</a>
      <a href="contact.html">Contact</a>
      <a href="login-register.html" class="login-btn">Login/Register</a>
    </nav>
  </header>

  <main class="contact-section">
    <h2>Contact Us</h2>
    <p>If you have any questions, feedback, or need help, feel free to reach out.</p>
    
    <form class="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your Name" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Your Email" required>

      <label for="subject">Subject</label>
      <input type="text" id="subject" placeholder="Subject" required>

      <label for="message">Message</label>
      <textarea id="message" placeholder="Write your message here..." rows="6" required></textarea>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 BloodBond. Made with ❤️ by Sujith.</p>
  </footer>
</body>
</html>
